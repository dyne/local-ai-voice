<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Browser Mic Transcription</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 24px; background: #f3f6fb; color: #1c2635; }
    .card { max-width: 900px; margin: 0 auto; background: #ffffff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
    button.start { background: #1f7a46; color: #fff; }
    button.stop { background: #9f2b2b; color: #fff; }
    #status { font-weight: 600; }
    #out { background: #0e1725; color: #dce5f4; border-radius: 10px; padding: 12px; min-height: 220px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Browser Microphone to Server Transcription</h2>
    <div class="row">
      <button id="startBtn" class="start">Start</button>
      <button id="stopBtn" class="stop" disabled>Stop</button>
      <label><input type="checkbox" id="saveSample" /> Save WAV capture</label>
      <label><input type="checkbox" id="silenceDetect" __SILENCE_DETECT_DEFAULT__ /> Voice enhance</label>
      <label>VAD: <select id="vadMode"><option value="0">0</option><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option></select></label>
      <label>Chunk (s): <input id="chunkSeconds" type="number" min="0.2" step="0.1" value="1.5" style="width:72px" /></label>
      <label>Overlap (s): <input id="overlapSeconds" type="number" min="0.0" step="0.05" value="0.25" style="width:72px" /></label>
      <span id="status">Idle</span>
    </div>
    <div id="out"></div>
  </div>
  <script>
    const TARGET_SAMPLE_RATE = 16000;
    let stream = null;
    let source = null;
    let eventSource = null;
    let audioSocket = null;
    let sessionId = null;
    let audioContext = null;
    let sourceNode = null;
    let workletNode = null;
    let sinkNode = null;

    const out = document.getElementById("out");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const saveSample = document.getElementById("saveSample");
    const silenceDetect = document.getElementById("silenceDetect");
    const vadMode = document.getElementById("vadMode");
    const chunkSeconds = document.getElementById("chunkSeconds");
    const overlapSeconds = document.getElementById("overlapSeconds");
    vadMode.value = "__VAD_MODE_DEFAULT__";

    function setStatus(v) { statusEl.textContent = v; }
    function appendLine(v) {
      out.textContent += (out.textContent ? "\n" : "") + v;
      out.scrollTop = out.scrollHeight;
    }

    function wsBaseUrl() {
      const proto = window.location.protocol === "https:" ? "wss" : "ws";
      return `${proto}://${window.location.host}`;
    }

    async function start() {
      sessionId = (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());
      setStatus("Requesting microphone...");
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        video: false
      });

      const response = await fetch("/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          save_sample: !!saveSample.checked,
          silence_detect: !!silenceDetect.checked,
          vad_mode: Number(vadMode.value),
          chunk_seconds: Number(chunkSeconds.value),
          overlap_seconds: Number(overlapSeconds.value),
          sample_rate: TARGET_SAMPLE_RATE
        })
      });
      if (!response.ok) {
        throw new Error("Session setup failed: " + await response.text());
      }

      eventSource = new EventSource("/events/" + sessionId);
      eventSource.onmessage = (evt) => appendLine(evt.data);
      eventSource.onerror = () => setStatus("Event stream disconnected");

      audioContext = new AudioContext();
      await audioContext.audioWorklet.addModule("/audio-worklet.js");

      sourceNode = audioContext.createMediaStreamSource(stream);
      workletNode = new AudioWorkletNode(audioContext, "pcm-resample-processor", {
        processorOptions: { targetSampleRate: TARGET_SAMPLE_RATE, chunkSamples: 2048 }
      });
      sinkNode = audioContext.createGain();
      sinkNode.gain.value = 0;

      audioSocket = new WebSocket(`${wsBaseUrl()}/audio/${sessionId}`);
      audioSocket.binaryType = "arraybuffer";
      await new Promise((resolve, reject) => {
        audioSocket.onopen = resolve;
        audioSocket.onerror = () => reject(new Error("Audio socket failed to open"));
      });

      workletNode.port.onmessage = (evt) => {
        if (audioSocket && audioSocket.readyState === WebSocket.OPEN) {
          audioSocket.send(evt.data);
        }
      };

      sourceNode.connect(workletNode);
      workletNode.connect(sinkNode);
      sinkNode.connect(audioContext.destination);

      setStatus("Streaming 16 kHz mono float32 audio to server");
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    async function stop() {
      stopBtn.disabled = true;
      startBtn.disabled = false;
      setStatus("Stopping...");

      if (workletNode) {
        try { workletNode.port.onmessage = null; } catch (_) {}
        try { workletNode.disconnect(); } catch (_) {}
        workletNode = null;
      }
      if (sinkNode) {
        try { sinkNode.disconnect(); } catch (_) {}
        sinkNode = null;
      }
      if (sourceNode) {
        try { sourceNode.disconnect(); } catch (_) {}
        sourceNode = null;
      }
      if (audioContext) {
        try { await audioContext.close(); } catch (_) {}
        audioContext = null;
      }
      if (audioSocket) {
        try { audioSocket.close(); } catch (_) {}
        audioSocket = null;
      }
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      if (sessionId) {
        try { await fetch("/session/" + sessionId, { method: "DELETE" }); } catch (_) {}
      }

      setStatus("Idle");
    }

    startBtn.addEventListener("click", async () => {
      try {
        await start();
      } catch (err) {
        setStatus("Error");
        appendLine("[client error] " + String(err));
        await stop();
      }
    });
    stopBtn.addEventListener("click", stop);
  </script>
</body>
</html>
