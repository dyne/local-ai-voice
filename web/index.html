<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Browser Mic Transcription</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 24px; background: #f3f6fb; color: #1c2635; }
    .card { max-width: 900px; margin: 0 auto; background: #ffffff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
    button.start { background: #1f7a46; color: #fff; }
    button.stop { background: #9f2b2b; color: #fff; }
    #status { font-weight: 600; }
    #out { background: #0e1725; color: #dce5f4; border-radius: 10px; padding: 12px; min-height: 220px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Browser Microphone to Server Transcription</h2>
    <div class="row">
      <button id="startBtn" class="start">Start</button>
      <button id="stopBtn" class="stop" disabled>Stop</button>
      <label><input type="checkbox" id="saveSample" /> Save WAV capture</label>
      <label><input type="checkbox" id="silenceDetect" __SILENCE_DETECT_DEFAULT__ /> Voice enhance</label>
      <label><input type="checkbox" id="echoCancellation" /> Echo cancellation</label>
      <label><input type="checkbox" id="noiseSuppression" /> Noise suppression</label>
      <label><input type="checkbox" id="autoGainControl" /> Auto gain control</label>
      <label><input type="checkbox" id="clientDebug" /> Client debug</label>
      <label>VAD: <select id="vadMode"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option></select></label>
      <label>Chunk (s): <input id="chunkSeconds" type="number" min="0.2" step="0.1" value="1.5" style="width:72px" /></label>
      <label>Overlap (s): <input id="overlapSeconds" type="number" min="0.0" step="0.05" value="0.00" style="width:72px" /></label>
      <span id="status">Idle</span>
    </div>
    <div id="out"></div>
  </div>
  <script>
    const TARGET_AUDIO_BITRATE = 48000;
    const CHUNK_TIMESLICE_MS = 250;
    let stream = null;
    let eventSource = null;
    let audioSocket = null;
    let sessionId = null;
    let mediaRecorder = null;
    let sentBlobCount = 0;

    const out = document.getElementById("out");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const saveSample = document.getElementById("saveSample");
    const silenceDetect = document.getElementById("silenceDetect");
    const echoCancellation = document.getElementById("echoCancellation");
    const noiseSuppression = document.getElementById("noiseSuppression");
    const autoGainControl = document.getElementById("autoGainControl");
    const clientDebug = document.getElementById("clientDebug");
    const vadMode = document.getElementById("vadMode");
    const chunkSeconds = document.getElementById("chunkSeconds");
    const overlapSeconds = document.getElementById("overlapSeconds");
    vadMode.value = "__VAD_MODE_DEFAULT__";

    function setStatus(v) { statusEl.textContent = v; }
    function appendLine(v) {
      out.textContent += (out.textContent ? "\n" : "") + v;
      out.scrollTop = out.scrollHeight;
    }
    function appendClientDebug(v) {
      if (!clientDebug.checked) {
        return;
      }
      appendLine(v);
    }

    function wsBaseUrl() {
      const proto = window.location.protocol === "https:" ? "wss" : "ws";
      return `${proto}://${window.location.host}`;
    }

    function preferredMimeType() {
      const candidates = [
        "audio/ogg;codecs=opus",
        "audio/webm;codecs=opus",
        "audio/ogg",
        "audio/webm",
      ];
      for (const candidate of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidate)) {
          return candidate;
        }
      }
      return "";
    }

    async function start() {
      sessionId = (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());
      setStatus("Requesting microphone...");
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          sampleRate: 48000,
          echoCancellation: !!echoCancellation.checked,
          noiseSuppression: !!noiseSuppression.checked,
          autoGainControl: !!autoGainControl.checked
        },
        video: false
      });
      const mimeType = preferredMimeType();
      if (!mimeType) {
        throw new Error("No supported Opus MediaRecorder MIME type");
      }
      const trackSettings = stream.getAudioTracks()[0] ? stream.getAudioTracks()[0].getSettings() : {};
      appendClientDebug(`[client] mime=${mimeType} sampleRate=${trackSettings.sampleRate || "unknown"} channelCount=${trackSettings.channelCount || "unknown"}`);

      const response = await fetch("/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          save_sample: !!saveSample.checked,
          silence_detect: !!silenceDetect.checked,
          debug: !!clientDebug.checked,
          vad_mode: Number(vadMode.value),
          chunk_seconds: Number(chunkSeconds.value),
          overlap_seconds: Number(overlapSeconds.value),
          mime_type: mimeType,
          audio_bitrate: TARGET_AUDIO_BITRATE
        })
      });
      if (!response.ok) {
        throw new Error("Session setup failed: " + await response.text());
      }

      eventSource = new EventSource("/events/" + sessionId);
      eventSource.onmessage = (evt) => appendLine(evt.data);
      eventSource.onerror = () => setStatus("Event stream disconnected");

      audioSocket = new WebSocket(`${wsBaseUrl()}/audio/${sessionId}`);
      await new Promise((resolve, reject) => {
        audioSocket.onopen = resolve;
        audioSocket.onerror = () => reject(new Error("Audio socket failed to open"));
      });
      appendClientDebug("[client] audio websocket open");

      mediaRecorder = new MediaRecorder(stream, {
        mimeType,
        audioBitsPerSecond: TARGET_AUDIO_BITRATE
      });
      appendClientDebug(`[client] recorder=${mediaRecorder.mimeType || mimeType} bitrate=${TARGET_AUDIO_BITRATE}`);
      mediaRecorder.ondataavailable = async (evt) => {
        if (!evt.data || evt.data.size === 0) {
          if (sentBlobCount < 4) {
            appendClientDebug("[client] empty recorder blob");
          }
          return;
        }
        if (audioSocket && audioSocket.readyState === WebSocket.OPEN) {
          sentBlobCount += 1;
          if (sentBlobCount <= 4) {
            appendClientDebug(`[client] blob #${sentBlobCount} size=${evt.data.size}`);
          }
          audioSocket.send(await evt.data.arrayBuffer());
        }
      };
      mediaRecorder.onerror = (evt) => {
        appendClientDebug("[client error] recorder " + String(evt.error || evt.name || evt));
      };
      mediaRecorder.start(CHUNK_TIMESLICE_MS);

      const actualRate = trackSettings.sampleRate ? `${trackSettings.sampleRate} Hz` : "native rate";
      setStatus(`Streaming Opus (${mimeType}, ${TARGET_AUDIO_BITRATE / 1000} kbps, ${actualRate})`);
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    async function stop() {
      stopBtn.disabled = true;
      startBtn.disabled = false;
      setStatus("Stopping...");

      if (mediaRecorder) {
        try { mediaRecorder.ondataavailable = null; } catch (_) {}
        try { mediaRecorder.onerror = null; } catch (_) {}
        if (mediaRecorder.state !== "inactive") {
          try { mediaRecorder.stop(); } catch (_) {}
        }
        mediaRecorder = null;
      }
      if (audioSocket) {
        try { audioSocket.close(); } catch (_) {}
        audioSocket = null;
      }
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      if (sessionId) {
        try { await fetch("/session/" + sessionId, { method: "DELETE" }); } catch (_) {}
      }
      sentBlobCount = 0;

      setStatus("Idle");
    }

    startBtn.addEventListener("click", async () => {
      try {
        await start();
      } catch (err) {
        setStatus("Error");
        appendLine("[client error] " + String(err));
        await stop();
      }
    });
    stopBtn.addEventListener("click", stop);
  </script>
</body>
</html>
