name: Cross-Platform Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Artifact
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: pwsh
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install numpy noisereduce webrtcvad-wheels sounddevice fastapi uvicorn websockets pydantic av pywebview "huggingface_hub[hf_xet]"
          python -m pip install --upgrade openvino openvino-genai openvino-tokenizers

      - name: Generate PyInstaller spec
        shell: pwsh
        run: |
          if (Test-Path local-ai-voice.spec) {
            Remove-Item local-ai-voice.spec -Force
          }
          python -m PyInstaller.utils.cliutils.makespec --onefile --name local-ai-voice `
            --hidden-import browser_webrtc `
            --hidden-import av `
            --hidden-import noisereduce `
            --hidden-import webrtcvad `
            --hidden-import uvicorn `
            --hidden-import webview `
            --hidden-import hf_xet `
            --additional-hooks-dir hooks `
            --collect-submodules uvicorn `
            --collect-submodules websockets `
            --collect-binaries openvino `
            --collect-data openvino `
            --collect-binaries openvino_genai `
            --collect-data openvino_genai `
            --collect-binaries openvino_tokenizers `
            --collect-data openvino_tokenizers `
            --collect-data webview `
            --collect-binaries hf_xet `
            --collect-data hf_xet `
            --add-data "frontend/dist;frontend/dist" `
            --add-data "web/index.html;web" `
            local-ai-voice.py

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller --clean local-ai-voice.spec

      - name: Package release asset
        shell: pwsh
        run: |
          $asset = "local-ai-voice-windows-x64.zip"
          $stage = "release-package"
          if (Test-Path $asset) {
            Remove-Item $asset -Force
          }
          if (Test-Path $stage) {
            Remove-Item $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item dist\local-ai-voice.exe $stage\
          Copy-Item README.md $stage\
          Copy-Item AGENTS.md $stage\
          Get-ChildItem -Path . -Filter "LICENSE*" -File | ForEach-Object {
            Copy-Item $_.FullName $stage\
          }
          Compress-Archive -Path "$stage\*" -DestinationPath $asset

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-voice-windows-x64
          path: local-ai-voice-windows-x64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: local-ai-voice-windows-x64.zip

  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install numpy noisereduce webrtcvad-wheels sounddevice fastapi uvicorn websockets pydantic av pywebview "huggingface_hub[hf_xet]"
          python -m pip install --upgrade openvino openvino-genai openvino-tokenizers

      - name: Generate PyInstaller spec
        run: |
          rm -f local-ai-voice.spec
          python -m PyInstaller.utils.cliutils.makespec --onefile --name local-ai-voice \
            --hidden-import browser_webrtc \
            --hidden-import av \
            --hidden-import noisereduce \
            --hidden-import webrtcvad \
            --hidden-import uvicorn \
            --hidden-import webview \
            --hidden-import hf_xet \
            --additional-hooks-dir hooks \
            --collect-submodules uvicorn \
            --collect-submodules websockets \
            --collect-binaries openvino \
            --collect-data openvino \
            --collect-binaries openvino_genai \
            --collect-data openvino_genai \
            --collect-binaries openvino_tokenizers \
            --collect-data openvino_tokenizers \
            --collect-data webview \
            --collect-binaries hf_xet \
            --collect-data hf_xet \
            --add-data "frontend/dist:frontend/dist" \
            --add-data "web/index.html:web" \
            local-ai-voice.py

      - name: Build executable
        run: |
          python -m PyInstaller --clean local-ai-voice.spec

      - name: Package release asset
        run: |
          asset="local-ai-voice-linux-x64.tar.gz"
          stage="release-package-linux"
          rm -f "$asset"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp dist/local-ai-voice "$stage"/
          cp README.md "$stage"/
          cp AGENTS.md "$stage"/
          find . -maxdepth 1 -type f -name 'LICENSE*' -exec cp {} "$stage"/ \;
          tar -czf "$asset" -C "$stage" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-voice-linux-x64
          path: local-ai-voice-linux-x64.tar.gz

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: local-ai-voice-linux-x64.tar.gz
